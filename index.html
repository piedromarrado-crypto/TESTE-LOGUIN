<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Login TESTE1</title>
  <link rel="stylesheet" href="estilo.css"> </head>
<body>
  <div class="container">
    
    <div id="login" class="aba ativa">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="text" id="loginId" placeholder="ID"><br>
        <input type="password" id="loginSenha" placeholder="Senha" required><br>
        <button type="submit">Entrar com ID</button>
      </form>

      <h3>Não lembra o ID?</h3>
      <form id="loginCpfForm">
        <input type="text" id="loginCpf" placeholder="CPF" required><br>
        <input type="password" id="loginCpfSenha" placeholder="Senha" required><br>
        <button type="submit">Entrar com CPF</button>
      </form>

      <p style="margin-top: 25px; font-size: 14px; color: #666;">
        Não tem uma conta? 
        <span onclick="mostrarAba('cadastro')" style="color: #66a6ff; cursor: pointer; text-decoration: underline; font-weight: bold;">
          Cadastre-se aqui
        </span>
      </p>
    </div>

    <div id="cadastro" class="aba">
      <h2>Cadastro</h2>
      <form id="cadastroForm">
        <input type="text" id="nome" placeholder="Nome" required><br>
        <input type="text" id="cpf" placeholder="CPF" required><br>
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="text" id="celular" placeholder="Celular" required><br>
        <input type="password" id="senha" placeholder="Senha" required><br>
        <button type="submit">Cadastrar</button>
      </form>
      
      <p style="margin-top: 20px; font-size: 14px;">
        <span onclick="mostrarAba('login')" style="color: #999; cursor: pointer; text-decoration: underline;">
          Voltar para o Login
        </span>
      </p>
    </div>

    <div id="bemVindo" class="aba">
      <div class="menu-interno" style="background:#333; color:white; padding:15px; display:flex; justify-content:space-between; border-radius:5px;">
        <div id="txtMenuBemVindo">Bem-vindo</div>
        <div>
          <button onclick="mostrarAba('perfil')" style="background:#66a6ff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; color:white;">Perfil</button>
          <button onclick="logout()" style="background:#ff6b6b; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; color:white; margin-left:10px;">Logout</button>
        </div>
      </div>
      <div class="conteudo" style="text-align:center; margin-top:50px; color:#333;">
        <h1 id="tituloBoasVindas">Olá!</h1>
        <p>Você entrou com sucesso.</p>
      </div>
    </div>

    <div id="perfil" class="aba">
      <div class="card" style="background:white; padding:20px; border-radius:10px; box-shadow:0px 4px 10px rgba(0,0,0,0.1); max-width:400px; margin:20px auto;">
        <h2>Perfil do Usuário</h2>
        <p><strong>Nome:</strong> <span id="perfNome"></span></p>
        <p><strong>CPF:</strong> <span id="perfCpf"></span></p>
        <p><strong>Email:</strong> <span id="perfEmail"></span></p>
        <p><strong>Celular:</strong> <span id="perfCelular"></span></p>
        <p><strong>ID:</strong> <span id="perfId"></span></p>
        <button onclick="mostrarAba('bemVindo')" style="background:#66a6ff; color:white; border:none; padding:10px 20px; margin-top:20px; border-radius:5px; cursor:pointer;">Voltar</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
